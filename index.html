<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GeoPin</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='12' fill='%23fffdfa' stroke='%231b2428' stroke-width='3'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23d84c31'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hud" aria-label="Game status">
        <div class="brand">
          <span class="mark" aria-hidden="true"></span>
          <h1>GeoPin</h1>
        </div>

        <div class="mode-switch" aria-label="Game mode">
          <button id="mode-map" type="button" aria-pressed="true">Map</button>
          <button id="mode-outline" type="button" aria-pressed="false">Outlines</button>
        </div>

        <div class="stats" aria-live="polite">
          <div class="stat">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="stat">
            <span>Streak</span>
            <strong id="streak">0</strong>
          </div>
          <div class="stat">
            <span>Round</span>
            <strong id="round">1/1</strong>
          </div>
        </div>
      </section>

      <section class="play-area">
        <aside class="question-panel" aria-label="Current question">
          <div class="question-meta">
            <span id="question-type">Flag</span>
            <span id="question-points">100 pts</span>
          </div>
          <div id="question-clue" class="question-clue"></div>
          <h2 id="question-text"></h2>
          <form id="answer-form" class="answer-form" hidden>
            <label for="country-answer">Answer</label>
            <div class="answer-row">
              <input
                id="country-answer"
                name="country-answer"
                type="text"
                autocomplete="off"
                autocapitalize="words"
                spellcheck="false"
              />
              <button id="submit-answer" type="submit">Submit</button>
            </div>
          </form>
          <p id="feedback" class="feedback" aria-live="assertive"></p>
          <div class="actions">
            <button id="next-button" type="button" disabled>Next</button>
            <button id="restart-button" type="button">Restart</button>
          </div>
        </aside>

        <section class="map-stage" aria-label="World map answer area">
          <div class="map-toolbar" aria-label="Map controls">
            <button id="zoom-in" type="button" aria-label="Zoom in" title="Zoom in">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6z"></path>
              </svg>
            </button>
            <button id="zoom-out" type="button" aria-label="Zoom out" title="Zoom out">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 11h14v2H5z"></path>
              </svg>
            </button>
            <button id="zoom-reset" type="button" aria-label="Reset map" title="Reset map">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5a7 7 0 1 1-6.32 4H3.5A9 9 0 1 0 12 3v2z"></path>
                <path d="M4 3v6h6V7H7.41A6.96 6.96 0 0 1 12 5V3a8.95 8.95 0 0 0-6.36 2.64L3 3z"></path>
              </svg>
            </button>
          </div>
          <svg id="world-map" viewBox="0 0 1000 500" role="img" aria-label="Blank world map">
            <rect class="ocean" width="1000" height="500"></rect>
            <g id="land-layer"></g>
            <g id="answer-layer"></g>
            <g id="pin-layer"></g>
          </svg>
          <div id="outline-stage" class="outline-stage" hidden>
            <svg
              id="country-outline"
              viewBox="0 0 420 320"
              role="img"
              aria-label="Country outline"
            >
              <rect class="outline-backdrop" width="420" height="320"></rect>
              <g id="outline-layer"></g>
            </svg>
          </div>
        </section>
      </section>
    </main>

    <script src="./src/data.js" defer></script>
    <script src="./src/app.js" defer></script>
  </body>
</html>
